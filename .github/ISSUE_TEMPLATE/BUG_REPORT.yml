# Issue template name
name: "Bug Report"
# Issue template description
description: "Report any bugs or issues to help us improve the Obvia ecosystem"
# Issue template title prefix
title: "obvia(*): "
# Labels automatically applied to this issue
labels: ["bug"]
# Issue template type
type: "bug"
# Default assignees for this issue
assignees: ["selcukcukur"]

# Issue Template
body:
  # Title
  - type: markdown
    attributes:
      value: "Please begin your title with obvia(product): followed by a short, clear description (e.g. obvia(typeface): kerning issue in obvia sans)"
  # Product
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: "Please select the Obvia product that this issue is related to"
      options:
        - Obvia Studio
        - Obvia Console
        - Obvia Desktop
        - Obvia Interface
        - Obvia Typeface
        - Obvia Registry
    validations:
      required: true
  # Checklist
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: "Please confirm you have completed the following before submitting"
      options:
        - label: "I have searched for existing issues to avoid duplicates"
        - label: "I have provided clear reproduction steps"
        - label: "I have included screenshots, logs, or error messages if available"
        - label: "I have specified the product version and environment (e.g. browser, OS)"
        - label: "I have described both the expected and actual behavior"
        - label: "I have kept the title concise and in the required format (e.g. obvia(console): …)"
  # Environment
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Please provide detailed information about your environment"
      placeholder: |
        OS: Ubuntu 22.04
        Browser: Chrome 122.0
        Node.js: 20.11.0
        Package Manager: pnpm 9.0.0
        Python: 3.11
        Tool: ttfautohint 1.7.4
        Obvia Version: 1.2.3
      validations:
        required: true
  # Description
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Please provide a clear and concise description of the issue"
      placeholder: "Steps to reproduce, observed behavior, expected behavior..."
    validations:
      required: true
  # Behavior
  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: "Describe the observed behavior and what you expected instead"
      placeholder: "Font kerning breaks instead of aligning properly..."
    validations:
      required: true
  # Steps to Reproduce
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "List the exact steps to reproduce the bug"
      placeholder: |
        1. Run `make build`
        2. Install font on Windows
        3. Open in Word
        4. Observe kerning issue

  # Screenshots
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: "Attach screenshots or proof images if available"
      placeholder: "Drag and drop images here"
  # Context
  - type: textarea
    id: additional
    attributes:
      label: Context
      description: "Add any other context about the problem here"
      placeholder: "Related issues, logs, configs..."
